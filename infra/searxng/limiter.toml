# Shipped for dev to silence “missing limiter.toml” when botdetection probes paths.
# Copied from upstream defaults; server.limiter stays false in settings.compose.yml.
# https://github.com/searxng/searxng/blob/master/searx/limiter.toml

[botdetection]

ipv4_prefix = 32
ipv6_prefix = 48

trusted_proxies = [
  '127.0.0.0/8',
  '::1',
]

[botdetection.ip_limit]

filter_link_local = false
link_token = false

[botdetection.ip_lists]

block_ip = []

pass_ip = []

pass_searxng_org = true
