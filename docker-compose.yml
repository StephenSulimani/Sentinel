services:
  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    ports:
      - "8081:8080"
    networks:
      - sentinel

  ai:
    build:
      context: .
      dockerfile: infra/Dockerfile.ai
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    environment:
      GO_MATH_URL: http://backend:8080
      SEARXNG_URL: http://searxng:8080
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      SEC_USER_AGENT: "${SEC_USER_AGENT:-ProjectSentinel/1.0 (mailto:dev@localhost)}"
    depends_on:
      - backend
      - searxng
    networks:
      - sentinel

  frontend:
    image: docker.io/node:22-bookworm-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://localhost:8081
      VITE_AI_URL: http://localhost:8000
    networks:
      - sentinel

  searxng:
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Compose-specific settings; see infra/searxng/searxng.settings.yml
      - ./infra/searxng/searxng.settings.yml:/etc/searxng/settings.yml
      - ./infra/searxng/limiter.toml:/etc/searxng/limiter.toml
      - searxng_data:/var/cache/searxng
    networks:
      - sentinel

networks:
  sentinel:
    driver: bridge

volumes:
  searxng_data:
  frontend_node_modules:
